name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy-convex:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Convex environment variables
        working-directory: apps/convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          pnpm exec convex env set AUTH_RESEND_KEY "${{ secrets.AUTH_RESEND_KEY }}"
          pnpm exec convex env set SITE_URL "${{ secrets.SITE_URL }}"
          pnpm exec convex env set VAPID_SUBJECT "${{ secrets.VAPID_SUBJECT }}"
          pnpm exec convex env set VAPID_PUBLIC_KEY "${{ secrets.VAPID_PUBLIC_KEY }}"
          pnpm exec convex env set VAPID_PRIVATE_KEY "${{ secrets.VAPID_PRIVATE_KEY }}"
          pnpm exec convex env set CLOUDFLARE_ACCOUNT_ID "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          pnpm exec convex env set CLOUDFLARE_RTK_APP_ID "${{ secrets.CLOUDFLARE_RTK_APP_ID }}"
          pnpm exec convex env set PARTYKIT_SECRET "${{ secrets.PARTYKIT_SECRET }}"

      - name: Deploy Convex backend
        working-directory: apps/convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: pnpm exec convex deploy

      - name: Run migrations
        working-directory: apps/convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: pnpm exec convex run migrations:runAll

      - name: Health check Convex
        run: |
          curl -f -s -o /dev/null -w "%{http_code}" "${{ secrets.VITE_CONVEX_URL }}" || exit 1

  deploy-cloudflare:
    needs: deploy-convex
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}
          VITE_PARTYKIT_HOST: ${{ secrets.VITE_PARTYKIT_HOST }}
        run: pnpm --filter @ripple/web build

      - name: Set wrangler secrets
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.CONVEX_SITE_URL }}" | pnpm exec wrangler secret put CONVEX_SITE_URL
          echo "${{ secrets.PARTYKIT_SECRET }}" | pnpm exec wrangler secret put PARTYKIT_SECRET

      - name: Deploy to Cloudflare Workers (frontend + collaboration DOs)
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      - name: Health check frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "https://ripple.conduits.space")
          echo "Frontend responded with HTTP $STATUS"
          if [ "$STATUS" = "000" ]; then echo "Frontend unreachable" && exit 1; fi

      - name: Deployment summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Convex backend deployed" >> $GITHUB_STEP_SUMMARY
          echo "Cloudflare Workers deployed (frontend + collaboration DOs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production URL: https://ripple.conduits.space" >> $GITHUB_STEP_SUMMARY
